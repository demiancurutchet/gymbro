const uid = () => Math.random().toString(36).slice(2, 10);
function todayISO() {
  const d = new Date();
  const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
}
function daysAgoISO(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
}
const PERIOD_DAYS = {
  week: 7,
  month: 30,
  year: 365
};
function startOfWeekMonday(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun .. 6=Sat
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0, 0, 0, 0);
  return d;
}
function isInCurrentCalendarWeek(dateIso) {
  const d = new Date(dateIso + "T00:00:00");
  const monday = startOfWeekMonday(new Date());
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23, 59, 59, 999);
  return d >= monday && d <= sunday;
}
function isInCurrentCalendarMonth(dateIso) {
  const d = new Date(dateIso + "T00:00:00");
  const now = new Date();

}

  return (Date.now() - new Date(dateIso + "T00:00:00").getTime()) / 86400000 <= days;
}
function fmtShort(iso) {
  if (!iso) return "";
  return new Date(iso + "T00:00:00").toLocaleDateString("es-AR", {
    day: "2-digit",
    month: "short"
  });
}
function fmtFull(iso) {
  if (!iso) return "";
  const s = new Date(iso + "T00:00:00").toLocaleDateString("es-AR", {
    weekday: "short",
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function fmtHomeDate(iso) {
  const d = new Date(iso + "T00:00:00");
  const day = d.toLocaleDateString("es-AR", {
    day: "numeric"

  const month = d.toLocaleDateString("es-AR", {

  });
  return `${day} ${month}`.toUpperCase();
}
function weeksSinceStart(logs, nutrition) {
  const dates = [...(logs || []).map(l => l.date), ...(nutrition || []).map(n => n.date)].filter(Boolean);
  if (dates.length === 0) return 1;
  const minDate = dates.reduce((min, d) => d < min ? d : min);
  const start = startOfWeekMonday(new Date(minDate + "T00:00:00"));
  const now = startOfWeekMonday(new Date());
  const diffWeeks = Math.round((now - start) / (7 * 86400000));
  return diffWeeks + 1;
}
function makeNormalSet(reps, weight) {
  return {
    id: uid(),
    type: "normal",
    reps,
    weight,
    drops: []

}
function defaultDraftSets() {
  return [makeNormalSet(10, 0), makeNormalSet(10, 0), makeNormalSet(10, 0)];
}
function getBase(sets) {
  const normal = sets.find(s => s.type === "normal");
  if (normal) return {
    reps: normal.reps,
    weight: normal.weight
  };
  if (sets[0]) return {
    reps: sets[0].reps,
    weight: sets[0].weight
  };
  return {
    reps: 10,
    weight: 0
  };
}
function resizeSets(sets, count, base) {
  const arr = sets.slice();
  if (count > arr.length) {
    while (arr.length < count) arr.push(makeNormalSet(base.reps, base.weight));
  } else if (count < arr.length) {
    arr.length = Math.max(1, count);
  }
  return arr;
}
function applyBaseToNormals(sets, reps, weight) {

    reps,
    weight

}

    id: uid(),
    reps: base.reps,
    weight: base.weight

}

    weight: base.weight,

}

  return Number(s.weight) || 0;
}
function setSummary(s, bodyweight) {
  if (s.type === "drop") {
    return `Drop set · ${s.drops.map(d => bodyweight && !d.weight ? `${d.reps} reps` : `${d.reps}×${d.weight}kg`).join(" → ")}`;
  }
  if (bodyweight && !s.weight) return `${s.reps} reps (peso corporal)`;

function cloneSetForSession(s) {
  return {
    id: uid(),
    type: s.type,
    reps: s.reps,

}
function cloneExerciseForSession(ex) {

}
function repsOfSet(s) {

}
function historyForExercise(logs, routineId, exerciseName) {
  const nameLower = exerciseName.trim().toLowerCase();
  const points = [];
  logs.filter(l => l.routineId === routineId).forEach(l => {
    const ex = l.exercises.find(e => e.name.trim().toLowerCase() === nameLower);
    if (ex && ex.sets.length) {
      const top = Math.max(0, ...ex.sets.map(setTopWeight));
      const topSet = ex.sets.find(s => setTopWeight(s) === top) || ex.sets[0];
      points.push({
        date: l.date,
        weight: top,
        reps: repsOfSet(topSet),
        logId: l.id,
        sets: ex.sets,
        bodyweight: !!ex.bodyweight,
        strength: l.strength,
        endurance: l.endurance,
        startedAt: l.startedAt,
        endedAt: l.endedAt
      });
    }
  });
  points.sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  return points;
}

const PAIN_AREAS = ["NADA", "Lumbares", "Espalda", "Cuello", "Hombros", "Bíceps", "Tríceps", "Pecho", "Cuádriceps", "Rodillas"];
const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
const fmt1 = n => (Math.round(n * 10) / 10).toFixed(1);
function ratedSessions(logs) {
  return logs.filter(l => typeof l.strength === "number" && typeof l.endurance === "number");
}
function weekdayInsights(sessions) {
  if (sessions.length < 6) return [];
  const byDay = {};
  sessions.forEach(s => {
    const d = new Date(s.date + "T00:00:00").getDay();
    (byDay[d] = byDay[d] || []).push(s);
  });
  const overallS = avg(sessions.map(s => s.strength));
  const overallE = avg(sessions.map(s => s.endurance));
  const out = [];
  Object.entries(byDay).forEach(([day, list]) => {
    if (list.length < 2) return;
    const s = avg(list.map(x => x.strength));
    const e = avg(list.map(x => x.endurance));
    const diff = s - overallS + (e - overallE);
    if (Math.abs(diff) < 1.5) return;
    const better = diff > 0;
    out.push({
      title: `Los ${WEEKDAY_NAMES[day]} rendís ${better ? "mejor" : "peor"} que el promedio`,
      desc: `Fuerza ${fmt1(s)} y resistencia ${fmt1(e)}, contra ${fmt1(overallS)} y ${fmt1(overallE)} en el resto de los días.`,
      n: list.length,
      good: better
    });
  });
  return out;
}
function restGapInsight(sessions, gapDays = 5) {
  const sorted = sessions.slice().sort((a, b) => a.date < b.date ? -1 : 1);
  const drops = [];
  for (let i = 1; i < sorted.length; i++) {
    const days = (new Date(sorted[i].date) - new Date(sorted[i - 1].date)) / 86400000;
    if (days > gapDays) {
      drops.push({
        sDelta: sorted[i].strength - sorted[i - 1].strength,
        eDelta: sorted[i].endurance - sorted[i - 1].endurance
      });
    }
  }
  if (drops.length < 2) return null;
  const sDelta = avg(drops.map(d => d.sDelta));
  const eDelta = avg(drops.map(d => d.eDelta));
  if (sDelta > -0.8 && eDelta > -0.8) return null;
  return {
    title: `Los parates de más de ${gapDays} días te afectan`,
    desc: `Cuando volvés después de más de ${gapDays} días sin entrenar, tu fuerza cae en promedio ${fmt1(Math.abs(sDelta))} puntos y tu resistencia ${fmt1(Math.abs(eDelta))}, comparado con tu última sesión antes del parate.`,
    n: drops.length,
    good: false
  };
}
function trendInsight(sessions) {
  if (sessions.length < 6) return null;
  const sorted = sessions.slice().sort((a, b) => a.date < b.date ? -1 : 1);
  const n = Math.min(4, Math.floor(sorted.length / 2));
  const first = sorted.slice(0, n),
    last = sorted.slice(-n);
  const fS = avg(first.map(s => s.strength)),
    lS = avg(last.map(s => s.strength));
  const fE = avg(first.map(s => s.endurance)),
    lE = avg(last.map(s => s.endurance));
  const diff = lS - fS + (lE - fE);
  if (Math.abs(diff) < 1.2) return null;
  const improving = diff > 0;
  return {
    title: improving ? "Venís mejorando con el tiempo" : "Tu rendimiento viene en baja",
    desc: `Tus primeras sesiones registradas promediaban fuerza ${fmt1(fS)} y resistencia ${fmt1(fE)}. Tus últimas, ${fmt1(lS)} y ${fmt1(lE)}.`,
    n: sorted.length,
    good: improving
  };
}
function routineInsight(sessions) {
  const byRoutine = {};
  sessions.forEach(s => {
    if (!byRoutine[s.routineName]) byRoutine[s.routineName] = [];
    byRoutine[s.routineName].push(s);
  });
  const names = Object.keys(byRoutine).filter(n => byRoutine[n].length >= 2);
  if (names.length < 2) return null;
  const stats = names.map(n => ({
    name: n,
    s: avg(byRoutine[n].map(x => x.strength)),
    e: avg(byRoutine[n].map(x => x.endurance)),
    n: byRoutine[n].length
  }));
  stats.sort((a, b) => b.s + b.e - (a.s + a.e));
  const best = stats[0],
    worst = stats[stats.length - 1];
  if (best.s + best.e - (worst.s + worst.e) < 1.5) return null;
  return {
    title: `"${best.name}" te rinde mejor que "${worst.name}"`,
    desc: `En "${best.name}" promediás fuerza ${fmt1(best.s)} / resistencia ${fmt1(best.e)}. En "${worst.name}", ${fmt1(worst.s)} / ${fmt1(worst.e)}.`,
    n: best.n + worst.n,
    good: true
  };
}
function proteinGoalInsight(sessions, nutrition, proteinGoal) {
  const proteinByDate = {};
  nutrition.forEach(e => {
    proteinByDate[e.date] = (proteinByDate[e.date] || 0) + (Number(e.protein) || 0);
  });
  const reached = sessions.filter(s => (proteinByDate[s.date] || 0) >= proteinGoal);
  const notReached = sessions.filter(s => (proteinByDate[s.date] || 0) < proteinGoal);
  if (reached.length < 2 || notReached.length < 2) return null;
  const sR = avg(reached.map(s => s.strength)),
    eR = avg(reached.map(s => s.endurance));
  const sN = avg(notReached.map(s => s.strength)),
    eN = avg(notReached.map(s => s.endurance));
  const diff = sR + eR - (sN + eN);
  if (Math.abs(diff) < 1.2) return null;
  return {
    title: `Llegar a los ${proteinGoal}g de proteína parece importar`,
    desc: `Los días que llegaste a la meta: fuerza ${fmt1(sR)} / resistencia ${fmt1(eR)}. Los días que no: ${fmt1(sN)} / ${fmt1(eN)}.`,
    n: reached.length,
    good: diff > 0
  };
}
function carbsBeforeTrainingInsight(sessions, nutrition, threshold = 100) {
  const withFoodLogged = sessions.filter(s => s.startedAt && nutrition.some(n => n.date === s.date));
  if (withFoodLogged.length < 4) return null;
  function carbsBefore(s) {
    return nutrition.filter(n => n.date === s.date && n.loggedAt && new Date(n.loggedAt) < new Date(s.startedAt)).reduce((sum, n) => sum + (Number(n.carbs) || 0), 0);
  }
  const high = withFoodLogged.filter(s => carbsBefore(s) >= threshold);
  const low = withFoodLogged.filter(s => carbsBefore(s) < threshold);
  if (high.length < 2 || low.length < 2) return null;
  const sHigh = avg(high.map(s => s.strength));
  const sLow = avg(low.map(s => s.strength));
  const diff = sHigh - sLow;
  if (Math.abs(diff) < 1.2) return null;
  return {
    title: diff > 0 ? `Comer ${threshold}g+ de carbos antes de entrenar te ayuda` : `Muchos carbos antes de entrenar no parecen ayudarte`,
    desc: `Los días que comiste ${threshold}g o más de carbohidratos antes de la sesión, tu fuerza promedió ${fmt1(sHigh)}/10. Cuando comiste menos, ${fmt1(sLow)}/10.`,
    n: high.length,
    good: diff > 0
  };
}
function foodInsights(sessions, nutrition) {
  const allNames = [...new Set(nutrition.map(e => e.name))];
  const results = [];
  allNames.forEach(name => {
    const datesEaten = new Set(nutrition.filter(e => e.name === name).map(e => e.date));
    if (datesEaten.size < 2) return;
    const withFood = sessions.filter(s => datesEaten.has(s.date));
    const withoutFood = sessions.filter(s => !datesEaten.has(s.date));
    if (withFood.length < 2 || withoutFood.length < 2) return;
    const sW = avg(withFood.map(s => s.strength)),
      eW = avg(withFood.map(s => s.endurance));
    const sWo = avg(withoutFood.map(s => s.strength)),
      eWo = avg(withoutFood.map(s => s.endurance));
    const diff = sW - sWo + (eW - eWo);
    if (Math.abs(diff) < 1.5) return;
    results.push({
      name,
      sW,
      eW,
      sWo,
      eWo,
      diff,
      n: withFood.length
    });
  });
  results.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
  return results.slice(0, 3).map(r => ({
    title: r.diff > 0 ? `Los días que comés ${r.name.toLowerCase()} rendís mejor` : `Los días que comés ${r.name.toLowerCase()} rendís peor`,
    desc: `Fuerza ${fmt1(r.sW)} / resistencia ${fmt1(r.eW)} esos días, contra ${fmt1(r.sWo)} / ${fmt1(r.eWo)} los demás días.`,
    n: r.n,
    good: r.diff > 0
  }));
}
function sessionDurationMin(s) {
  if (!s.startedAt || !s.endedAt) return null;
  const mins = (new Date(s.endedAt) - new Date(s.startedAt)) / 60000;
  return mins > 0 && mins < 6 * 60 ? mins : null; // sanity bounds, ignore obvious data glitches
}
function hourOfDayInsight(sessions) {
  const timed = sessions.filter(s => s.startedAt);
  if (timed.length < 6) return null;
  const byHour = {};
  timed.forEach(s => {
    const h = new Date(s.startedAt).getHours();
    (byHour[h] = byHour[h] || []).push(s);
  });
  const overallS = avg(timed.map(s => s.strength));
  const overallE = avg(timed.map(s => s.endurance));
  let best = null;
  Object.entries(byHour).forEach(([h, list]) => {
    if (list.length < 2) return;
    const s = avg(list.map(x => x.strength));
    const e = avg(list.map(x => x.endurance));
    const diff = s - overallS + (e - overallE);
    if (Math.abs(diff) >= 1.5 && (!best || Math.abs(diff) > Math.abs(best.diff))) best = {
      hour: Number(h),
      s,
      e,
      n: list.length,
      diff
    };
  });
  if (!best) return null;
  const range = `${String(best.hour).padStart(2, "0")}:00–${String(best.hour).padStart(2, "0")}:59`;
  return {
    title: `Entrenar entre las ${range} parece ${best.diff > 0 ? "ayudarte" : "no ayudarte"}`,
    desc: `Fuerza ${fmt1(best.s)} / resistencia ${fmt1(best.e)} en ese horario, contra ${fmt1(overallS)} / ${fmt1(overallE)} en general.`,
    n: best.n,
    good: best.diff > 0
  };
}
function durationInsight(sessions) {
  const withDuration = sessions.map(s => ({
    ...s,
    _min: sessionDurationMin(s)
  })).filter(s => s._min !== null);
  if (withDuration.length < 6) return null;
  const sorted = withDuration.slice().sort((a, b) => a._min - b._min);
  const median = sorted[Math.floor(sorted.length / 2)]._min;
  const longer = withDuration.filter(s => s._min > median);
  const shorter = withDuration.filter(s => s._min <= median);
  if (longer.length < 2 || shorter.length < 2) return null;
  const sL = avg(longer.map(s => s.strength)),
    eL = avg(longer.map(s => s.endurance));
  const sS = avg(shorter.map(s => s.strength)),
    eS = avg(shorter.map(s => s.endurance));
  const diff = eL - eS + (sL - sS);
  if (Math.abs(diff) < 1.2) return null;
  return {

  }
